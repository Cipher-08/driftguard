name: CI

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -v ./...

  frontend:
    name: Frontend (Node/React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: |
          if [ -f package.json ] && npm run | grep -q lint; then npm run lint; else echo "No lint script"; fi
      - name: Build
        run: npm run build
      - name: Test
        run: |
          if [ -f package.json ] && npm run | grep -q test; then npm test -- --watchAll=false; else echo "No test script"; fi
